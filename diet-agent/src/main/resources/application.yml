spring:
  application:
    name: harness-agent
  datasource:
    url: jdbc:mysql://localhost:3306/diet_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.diet.model
  configuration:
    map-underscore-to-camel-case: true
server:
  port: 8080
agentscope:
  dashscope:
    api-key: 请写入自己的APIkey
diet:
  llm:
    main-model: qwen-max
    light-model: qwen-turbo
  session:
    max-history-turns: 10
logging:
  level:
    com.diet: INFO
